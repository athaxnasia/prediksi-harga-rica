<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk / Daftar - RicaHolic</title>

  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-left">

      <div class="overlay"></div>

      <div class="left-content">
        <h1>🌶️ RicaHolic</h1>

        <p>
          Pantau harga rica, lihat prediksi AI,
          dan nikmati pengalaman interaktif
          untuk masyarakat Kota Manado.
        </p>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="auth-right">

      <div class="form-box">

        <!-- TOGGLE -->
        <div class="toggle-group">
          <button id="btn-login" class="toggle-btn active">
            Masuk
          </button>

          <button id="btn-register" class="toggle-btn">
            Daftar
          </button>
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form" class="form active-form">

          <h2>Selamat Datang</h2>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="login-email" required>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" required>
        </div>
        
        <button type="submit" class="submit-btn">
            Masuk
            
        </button>
        <p class="forgot-wrapper">
          <a href="#" id="forgot-password-link">
              Lupa Password?
          </a>
       </p>

        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" class="form">

          <h2>Buat Akun</h2>

          <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="register-name" required>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="register-email" required>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="register-password" required>
          </div>

          <div class="input-group">
            <label>Konfirmasi Password</label>
            <input type="password" id="register-confirm" required>
          </div>

          <button type="submit" class="submit-btn">
            Daftar
          </button>


        </form>

        <!-- MESSAGE -->
        <div id="message-box"></div>

      </div>

    </div>

  </div>

  <!-- POPUP RESET PASSWORD -->
<div class="popup-overlay" id="popup-reset">

  <div class="popup-box">

    <button class="close-popup" id="close-popup">
      ✕
    </button>

    <h2>Reset Password</h2>

    <p>
      Masukkan email akun Anda.
    </p>

    <input
      type="email"
      id="reset-email"
      placeholder="Email Anda"
    >

    <button id="btn-reset-password" class="submit-btn">
      Kirim Link Reset
    </button>

  </div>

</div>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
